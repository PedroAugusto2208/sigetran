<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGETRAN - Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <div class="login-box">
            <h1>SIGETRAN</h1>
            <p class="subtitle">Sistema de Gestao de Transporte</p>

            <form>
                <div class="form-group">
                    <label>Usuario</label>
                    <input type="text" placeholder="Digite seu login">
                </div>
                <div class="form-group">
                    <label>Senha</label>
                    <input type="password" placeholder="Digite sua senha">
                </div>
                <button type="button" class="btn-login" onclick="window.location.href='02-dashboard.html'">Entrar</button>
            </form>
        </div>
    </div>
</body>
</html>

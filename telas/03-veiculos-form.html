<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SIGETRAN - Cadastrar Veiculo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="layout">
        <aside class="sidebar">
            <div class="sidebar-header">
                <h2>SIGETRAN</h2>
                <span>Sistema de Gestao de Transporte</span>
            </div>
            <nav>
                <ul>
                    <li><a href="02-dashboard.html"><span class="icon">&#9776;</span> Dashboard</a></li>
                    <li><a href="03-veiculos.html" class="active"><span class="icon">&#9951;</span> Frota / Veiculos</a></li>
                    <li><a href="04-motoristas.html"><span class="icon">&#9823;</span> Motoristas</a></li>
                    <li><a href="05-clientes.html"><span class="icon">&#9734;</span> Clientes</a></li>
                    <li><a href="06-rotas.html"><span class="icon">&#10132;</span> Rotas</a></li>
                    <li><a href="07-cargas.html"><span class="icon">&#9744;</span> Cargas</a></li>
                    <li><a href="08-viagens.html"><span class="icon">&#9992;</span> Viagens</a></li>
                    <li><a href="09-frete.html"><span class="icon">&#36;</span> Calculo de Frete</a></li>
                    <li><a href="10-relatorios.html"><span class="icon">&#9783;</span> Relatorios</a></li>
                    <li><a href="11-usuarios.html"><span class="icon">&#9881;</span> Usuarios</a></li>
                    <li><a href="01-login.html"><span class="icon">&#10140;</span> Sair</a></li>
                </ul>
            </nav>
        </aside>

        <main class="main-content">
            <div class="topbar">
                <h1>Cadastrar Veiculo</h1>
                <div class="user-info">
                    <span>Gestor de Transporte</span>
                    <div class="user-avatar">GT</div>
                </div>
            </div>

            <div class="page-content">
                <div class="form-container">
                    <h3>Dados do Veiculo</h3>
                    <form>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Placa</label>
                                <input type="text" placeholder="AAA-0000">
                            </div>
                            <div class="form-group">
                                <label>Ano de Fabricacao</label>
                                <input type="number" placeholder="2024">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Modelo</label>
                                <input type="text" placeholder="Ex: FH 540">
                            </div>
                            <div class="form-group">
                                <label>Marca</label>
                                <input type="text" placeholder="Ex: Volvo">
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>Capacidade de Carga (kg)</label>
                                <input type="number" placeholder="30000">
                            </div>
                            <div class="form-group">
                                <label>Status</label>
                                <select>
                                    <option>Ativo</option>
                                    <option>Inativo</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-actions">
                            <button type="button" class="btn-primary" onclick="window.location.href='03-veiculos.html'">Salvar</button>
                            <a href="03-veiculos.html" class="btn-secondary">Cancelar</a>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>
</body>
</html>

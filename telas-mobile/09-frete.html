<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SIGETRAN Mobile - Calculo de Frete</title>
    <link rel="stylesheet" href="mobile-style.css">
</head>
<body class="has-bottom-nav">
    <div class="mobile-header">
        <button class="menu-icon" onclick="history.back()">&#8592;</button>
        <h1>Calculo de Frete</h1>
        <div class="user-avatar">FN</div>
    </div>

    <div class="page-content">
        <div class="form-container">
            <form>
                <div class="form-group">
                    <label>Rota</label>
                    <select>
                        <option>Selecione...</option>
                        <option selected>SP &rarr; RJ (435 km)</option>
                        <option>CWB &rarr; FLN (300 km)</option>
                        <option>BH &rarr; BSB (716 km)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Veiculo</label>
                    <select>
                        <option>Selecione...</option>
                        <option selected>ABC-1234 - Volvo (30.000 kg)</option>
                        <option>DEF-5678 - Scania (28.000 kg)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Carga</label>
                    <select>
                        <option>Selecione...</option>
                        <option selected>Eletronicos (12.000 kg) - Fragil</option>
                        <option>Combustiveis (25.000 kg) - Perigosa</option>
                        <option>Alimentos (18.000 kg) - Perecivel</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Cliente</label>
                    <select>
                        <option>Selecione...</option>
                        <option selected>Distribuidora ABC Ltda</option>
                        <option>Comercial XYZ S.A.</option>
                    </select>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn-primary" style="width: 100%;">Calcular Frete</button>
                </div>
            </form>

            <div class="frete-resultado">
                <h4>Resultado</h4>
                <div class="frete-linha">
                    <span>Distancia</span>
                    <span>435 km</span>
                </div>
                <div class="frete-linha">
                    <span>Valor base</span>
                    <span>R$ 1.522,50</span>
                </div>
                <div class="frete-linha">
                    <span>Fator peso (40%)</span>
                    <span>+ R$ 304,50</span>
                </div>
                <div class="frete-linha">
                    <span>Pedagios</span>
                    <span>+ R$ 85,40</span>
                </div>
                <div class="frete-linha">
                    <span>Adicional fragil (15%)</span>
                    <span>+ R$ 274,05</span>
                </div>
                <div class="frete-linha frete-total">
                    <span>TOTAL</span>
                    <span>R$ 2.186,45</span>
                </div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <a href="02-dashboard.html"><span class="nav-icon">&#9776;</span>Home</a>
        <a href="08-viagens.html"><span class="nav-icon">&#9992;</span>Viagens</a>
        <a href="03-veiculos.html"><span class="nav-icon">&#9951;</span>Frota</a>
        <a href="09-frete.html" class="active"><span class="nav-icon">&#36;</span>Frete</a>
        <a href="10-relatorios.html"><span class="nav-icon">&#9783;</span>Mais</a>
    </nav>
</body>
</html>

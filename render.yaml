# Deploy do backend SIGETRAN no Render (https://render.com)
# Crie um "Blueprint" apontando para este repositório (este arquivo fica na RAIZ).
services:
  - type: web
    name: sigetran-backend
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true          # Render gera um segredo seguro
    # OBS: plano free nao suporta disco persistente. O SQLite fica em disco
    # efemero (reseta em cada deploy/restart); o usuario admin e recriado
    # automaticamente no boot. Para persistir dados, suba para plano pago e
    # reative o bloco "disk" + a env DB_STORAGE=/data/sigetran.db.
